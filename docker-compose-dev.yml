services:
  aggre-api:
    image: aggre-api:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aggre-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${HOST_PORT:-8090}:${PORT:-3000}"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://${DB_USER:-root}:${DB_PASSWORD:-123456}@${DB_HOST:-aggre-postgres}:${DB_PORT:-5432}/${DB_NAME:-aggre-api}
      - REDIS_CONN_STRING=${REDIS_CONN_STRING:-redis://aggre-redis}
      - PORT=${PORT:-3000}
      - GIN_MODE=${GIN_MODE:-debug}
      - TZ=${TZ:-Asia/Shanghai}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - ERROR_LOG_ENABLED=${ERROR_LOG_ENABLED:-true}
      - BATCH_UPDATE_ENABLED=${BATCH_UPDATE_ENABLED:-true}
      # 允许本地 5173 前端跨域访问
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN:-http://localhost:5173}
    depends_on:
      - aggre-redis
      - aggre-postgres
    networks:
      - aggre-network
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:${PORT:-3000}/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  aggre-redis:
    image: redis:latest
    container_name: aggre-redis
    restart: always
    networks:
      - aggre-network

  aggre-postgres:
    image: postgres:15
    container_name: aggre-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-aggre-api}
    volumes:
      # 复用正式 compose 的同一个 volume，数据完全一致
      - aggre_pg_data:/var/lib/postgresql/data
    networks:
      - aggre-network

volumes:
  aggre_pg_data:
    external: true
    name: aggre-api_aggre_pg_data

networks:
  aggre-network:
    driver: bridge
