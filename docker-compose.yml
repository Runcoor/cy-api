services:
  aggre-api:
    # Production deploys pull this prebuilt image from GHCR (built by
    # .github/workflows/deploy.yml on push to main). The VPS itself never
    # runs `docker compose build` — it would OOM on the bun frontend build.
    # Override AGGRE_API_IMAGE to pin a specific tag (e.g. sha-…) for rollback.
    image: ${AGGRE_API_IMAGE:-ghcr.io/runcoor/aggre-api:latest}
    # Local dev / CI fallback only — not used by the production deploy path.
    # `docker compose build` will still rebuild and tag this image locally.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aggre-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${HOST_PORT:-8090}:${PORT:-3000}"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://${DB_USER:-root}:${DB_PASSWORD:-123456}@${DB_HOST:-aggre-postgres}:${DB_PORT:-5432}/${DB_NAME:-aggre-api}
      - REDIS_CONN_STRING=${REDIS_CONN_STRING:-redis://aggre-redis}
      - PORT=${PORT:-3000}
      - GIN_MODE=${GIN_MODE:-debug}
      - TZ=${TZ:-Asia/Shanghai}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - ERROR_LOG_ENABLED=${ERROR_LOG_ENABLED:-true}
      - BATCH_UPDATE_ENABLED=${BATCH_UPDATE_ENABLED:-true}
    depends_on:
      - aggre-redis
      - aggre-postgres
    networks:
      - aggre-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:${PORT:-3000}/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  aggre-redis:
    image: redis:latest
    container_name: aggre-redis
    restart: always
    networks:
      - aggre-network

  aggre-postgres:
    image: postgres:15
    container_name: aggre-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-aggre-api}
    volumes:
      - aggre_pg_data:/var/lib/postgresql/data
    networks:
      - aggre-network

volumes:
  aggre_pg_data:

networks:
  aggre-network:
    driver: bridge
