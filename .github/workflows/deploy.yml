name: Deploy to Production

# Push to main → build a single linux/amd64 image on GH Actions (free, 7GB
# RAM, no risk of OOMing the production VPS), publish to GHCR, then SSH
# into the VPS to docker compose pull + up. The VPS no longer builds.
#
# Manual trigger: Actions → Deploy → Run workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'why (optional)'
        required: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.value }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "main-${GITHUB_SHA::7}")
          echo "$VERSION" > VERSION
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Normalize GHCR repository name (lowercase)
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.GHCR_REPOSITORY }}

      - name: Build & push image (linux/amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GHCR_REPOSITORY }}:latest
            ${{ env.REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ steps.version.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.GHCR_REPOSITORY }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          {
            echo "### Production image"
            echo "- \`${{ env.REGISTRY }}/${{ env.GHCR_REPOSITORY }}:latest\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ steps.version.outputs.value }}\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.GHCR_REPOSITORY }}:sha-${{ github.sha }}\`"
            echo "- digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          # Pass version + sha so the VPS log shows exactly which build it pulled.
          envs: VERSION,COMMIT_SHA
          script_stop: true
          script: |
            set -euo pipefail

            VERSION="${{ needs.build-and-push.outputs.version }}"
            COMMIT_SHA="${{ github.sha }}"

            PROJECT_DIR="/data/stable/aggre-api"
            LOG_FILE="$HOME/aggre-deploy.log"
            LOCK_FILE="/tmp/aggre-deploy.lock"

            if [ -f "$LOCK_FILE" ]; then
              echo "$(date '+%Y-%m-%d %H:%M:%S') [SKIP] Deploy already in progress" | tee -a "$LOG_FILE"
              exit 0
            fi
            trap 'rm -f "$LOCK_FILE"' EXIT
            touch "$LOCK_FILE"

            {
              echo "========================================"
              echo "$(date '+%Y-%m-%d %H:%M:%S') [START] Deploy $VERSION ($COMMIT_SHA)"

              cd "$PROJECT_DIR"

              # docker-compose.yml may have changed (e.g. image tag, env vars).
              # Pull only — no local build runs anywhere.
              echo "[INFO] git pull"
              git pull --ff-only origin main

              echo "[INFO] docker compose pull aggre-api"
              docker compose pull aggre-api

              echo "[INFO] docker compose up -d --no-build"
              docker compose up -d --no-build

              echo "[INFO] docker image prune -f"
              docker image prune -f || true

              echo "$(date '+%Y-%m-%d %H:%M:%S') [DONE] Deploy $VERSION completed"
              echo "========================================"
            } 2>&1 | tee -a "$LOG_FILE"
