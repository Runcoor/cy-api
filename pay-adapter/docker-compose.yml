services:
  pay-adapter:
    build: .
    container_name: pay-adapter
    restart: always
    ports:
      # 只监听 localhost，由 Caddy 反代，不直接暴露
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
